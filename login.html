{% extends 'base.html' %}

{% block content %}
<style>
    :root {
        --cyber-blue: #00d2ff;
        --cyber-dark: #0a0e17;
    }

    body {
        background: radial-gradient(circle at center, #1a1f2c 0%, #0a0e17 100%);
        color: #e0e0e0;
        font-family: 'Inter', sans-serif;
    }

    .glass-card {
        background: rgba(20, 25, 35, 0.6);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        padding: 3rem;
        transition: all 0.3s ease;
    }

    .form-control {
        background: rgba(0, 0, 0, 0.3) !important;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white !important;
        padding: 12px 20px;
        border-radius: 12px;
    }

    .form-control:focus {
        border-color: var(--cyber-blue);
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
    }

    .btn-cyber {
        padding: 12px;
        border-radius: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
        background: var(--cyber-blue);
        color: var(--cyber-dark);
        border: none;
    }

    .btn-cyber:hover {
        box-shadow: 0 0 25px rgba(0, 210, 255, 0.4);
        transform: translateY(-2px);
    }
</style>

<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5">
        <div class="glass-card shadow-2xl">
            <div class="text-center mb-5">
                <i class="bi bi-shield-lock text-info fs-1 mb-3"></i>
                <h2 class="fw-bold text-white">Vault Access</h2>
                <p class="text-muted small">Authorize session using cryptographic credentials.</p>
            </div>
            
            <form method="POST">
                <div class="mb-4">
                    <label class="form-label text-info small fw-bold">USERNAME</label>
                    <input type="text" class="form-control" name="username" placeholder="user_identity" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-info small fw-bold">MASTER PASSWORD</label>
                    <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-cyber w-100 mt-3">AUTHORIZE ACCESS</button>
            </form>
            
            <div class="text-center mt-4">
                <p class="small text-muted">New identity required? <a href="{{ url_for('register') }}" class="text-info text-decoration-none fw-bold">Initialize Vault</a></p>
            </div>
        </div>
    </div>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
{% endblock %}
